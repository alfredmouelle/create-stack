name: Publish CLI

# Publishes cli/package.json's version on a pushed v* tag, via Trusted Publishing (OIDC).

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write # required to mint the OIDC token
  contents: read

jobs:
  # Gate: a broken scaffold must never reach npm.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @alfredmouelle/create-stack test
      - run: pnpm --filter @alfredmouelle/create-stack test:smoke

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      # OIDC publishing needs npm >= 11.5.1; pin 11.x, a bad @latest broke it (npm/cli#9722).
      - run: npm install -g npm@11

      # Public repo, so trusted publishing attaches provenance on its own.
      - name: Publish
        working-directory: cli
        run: npm publish --access public
