name: Publish CLI

# Publishes @alfredmouelle/create-stack on every pushed v* tag.
# Auth via npm Trusted Publishing (OIDC) — no NPM_TOKEN secret stored.
# The version published is whatever cli/package.json holds at the tagged commit;
# pushing a tag whose version is already on npm just fails (npm rejects republish).

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write # required to mint the OIDC token
  contents: read

jobs:
  # Gate: a broken scaffold must never reach npm. Runs the same fast build matrix
  # plus the full smoke (install + typecheck + biome) on both base apps.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @alfredmouelle/create-stack test
      - run: pnpm --filter @alfredmouelle/create-stack test:smoke

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing needs npm >= 11.5.1; Node 22 ships npm 10.x. Pin to 11.x
      # (not a floating @latest) so the "Cannot find module 'sigstore'" breakage in a
      # bad @latest can't reach us again (see npm/cli#9722, fixed by #9740).
      - run: npm install -g npm@11

      # prepack (scripts/bundle.mjs) snapshots apps/ + packages/ into cli/_stack.
      # Repo is public, so trusted publishing generates provenance automatically.
      - name: Publish
        working-directory: cli
        run: npm publish --access public
